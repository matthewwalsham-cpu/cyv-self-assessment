<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youth Voice Self-Assessment — Centre for Youth Voice</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#faf9f9;color:#1a1a1a;min-height:100vh}
button,textarea,input{font-family:inherit}
button{transition:all 0.15s ease;cursor:pointer}
button:focus,input:focus,textarea:focus{outline:2px solid #861F57;outline-offset:2px}
input,textarea{transition:border-color 0.15s ease,box-shadow 0.15s ease}
input:focus,textarea:focus{border-color:#861F57!important;box-shadow:0 0 0 3px rgba(134,31,87,0.12)!important;outline:none}
#app{max-width:100%;margin:0;padding:1.25rem}
.screen{animation:fadeUp 0.25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.header{background:linear-gradient(135deg,#861F57 0%,#6b1847 100%);padding:1.1rem 1.4rem;border-radius:12px;margin-bottom:1.5rem;display:flex;align-items:center;gap:12px;box-shadow:0 4px 16px rgba(134,31,87,0.25)}
.header-text{flex:1}
.header-eyebrow{font-size:10px;font-weight:700;color:rgba(255,255,255,0.65);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px}
.header-title{font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.01em}
.fs-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;flex-shrink:0}
.fs-btn:hover{background:rgba(255,255,255,0.25)}
.step-badge{display:inline-flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.step-pill{background:#861F57;color:#fff;font-size:10px;font-weight:800;padding:4px 12px;border-radius:100px;letter-spacing:0.06em;text-transform:uppercase}
.step-label{font-size:13px;color:#888;font-weight:500}
.card{background:#fff;border:1px solid #ebe8e8;border-radius:12px;padding:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.card-top{border-top:3px solid #861F57}
.field-label{font-size:11px;color:#777;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;display:block}
.req{color:#c0392b}
input[type=text]{width:100%;border:1.5px solid #e0dede;border-radius:8px;padding:10px 13px;font-size:14px;color:#1a1a1a;background:#fff}
input[type=text]:hover{border-color:#c9b8c2}
textarea{width:100%;border:1.5px solid #e0dede;border-radius:8px;padding:10px 13px;font-size:14px;color:#1a1a1a;background:#fff;resize:vertical;line-height:1.65}
textarea:hover{border-color:#c9b8c2}
.btn-primary{background:#861F57;color:#fff;border:none;padding:0.65rem 1.4rem;border-radius:8px;font-size:14px;font-weight:700;letter-spacing:0.01em;box-shadow:0 2px 8px rgba(134,31,87,0.3)}
.btn-primary:hover{background:#6b1847;box-shadow:0 4px 14px rgba(134,31,87,0.4);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0);box-shadow:0 1px 4px rgba(134,31,87,0.3)}
.btn-primary:disabled{background:#d4c5cc;color:#a0899a;cursor:not-allowed;box-shadow:none;transform:none}
.btn-secondary{background:#fff;color:#861F57;border:1.5px solid #861F57;padding:0.62rem 1.3rem;border-radius:8px;font-size:14px;font-weight:700}
.btn-secondary:hover{background:#F7EBF2;transform:translateY(-1px)}
.btn-secondary:active{transform:translateY(0)}
.progress-wrap{margin-bottom:1.25rem}
.progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.progress-label{font-size:12px;font-weight:700;color:#861F57;text-transform:uppercase;letter-spacing:0.05em}
.progress-pct{font-size:12px;color:#aaa;font-weight:500}
.progress-track{height:5px;background:#f0e6ec;border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#861F57,#c4587e);border-radius:100px;transition:width 0.4s cubic-bezier(.4,0,.2,1)}
.principle-banner{background:#F7EBF2;border-left:4px solid #861F57;border-radius:0 10px 10px 0;padding:0.9rem 1.1rem;margin-bottom:1.25rem}
.principle-banner p{font-size:15px;font-weight:700;color:#5C1039;line-height:1.4}
.sub-card{background:#fff;border:1px solid #ebe8e8;border-radius:12px;padding:1.25rem;border-top:3px solid #861F57;transition:box-shadow 0.2s ease}
.sub-card:hover{box-shadow:0 4px 16px rgba(134,31,87,0.08)}
.sub-card-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:1rem;line-height:1.5}
.score-btns{display:flex;gap:8px;margin-bottom:4px}
.score-btn{flex:1;padding:12px 6px;border-radius:9px;cursor:pointer;text-align:center;transition:all 0.15s ease;border:1.5px solid #e0dede;background:#fff;color:#888}
.score-btn:hover{border-color:#c9b8c2;transform:translateY(-1px)}
.score-num{font-size:22px;font-weight:800;margin-bottom:3px;line-height:1}
.score-desc{font-size:10px;line-height:1.35;font-weight:500}
.score-hint{font-size:12px;color:#861F57;margin-top:8px;line-height:1.5;font-style:italic;font-weight:500;padding:8px 10px;background:#F7EBF2;border-radius:6px}
.drag-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem}
.drag-item{display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid #ebe8e8;border-radius:10px;padding:13px 14px;cursor:grab;user-select:none;transition:box-shadow 0.15s ease,border-color 0.15s ease,transform 0.15s ease}
.drag-item:hover{border-color:#c9b8c2;box-shadow:0 3px 12px rgba(0,0,0,0.07)}
.drag-item.dragging{opacity:0.4;cursor:grabbing}
.drag-item.drag-over{border-color:#861F57;background:#F7EBF2;transform:scale(1.01);box-shadow:0 6px 20px rgba(134,31,87,0.15)}
.drag-handle{color:#ccc;font-size:16px;flex-shrink:0;line-height:1;transition:color 0.15s;letter-spacing:-2px}
.drag-item:hover .drag-handle{color:#c9b8c2}
.drag-num{font-size:14px;font-weight:800;color:#861F57;min-width:22px;text-align:center;flex-shrink:0}
.drag-title{flex:1;font-size:14px;color:#1a1a1a;line-height:1.45;font-weight:500}
.summary-section-header{display:flex;align-items:center;gap:10px;margin-bottom:0.875rem;padding:0.65rem 1rem;background:#F7EBF2;border-radius:9px}
.summary-priority-pill{background:#861F57;color:#fff;font-size:10px;font-weight:800;padding:3px 10px;border-radius:100px;flex-shrink:0;text-transform:uppercase;letter-spacing:0.05em}
.summary-section-title{font-size:14px;font-weight:700;color:#5C1039}
.summary-row{border:1px solid #ebe8e8;border-radius:9px;padding:1rem;margin-bottom:8px}
.summary-row-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:0.75rem;line-height:1.45}
.summary-grid{display:grid;grid-template-columns:78px 1fr 1fr;gap:1rem;align-items:start}
.summary-col-label{font-size:9px;color:#aaa;margin-bottom:5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.summary-col-val{font-size:13px;color:#333;line-height:1.6}
.score-pill{display:inline-block;padding:3px 13px;border-radius:100px;font-size:13px;font-weight:800}
.rank-list-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #f0ecec}
.rank-list-num{font-weight:800;color:#861F57;min-width:20px;flex-shrink:0}
.rank-list-title{font-size:14px;color:#1a1a1a}
@media print{.no-print{display:none!important}.print-avoid{page-break-inside:avoid}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const P=[
  {id:'p1',title:'Youth voice feeds into ongoing learning and improvement',sub:[
    {id:'p1a',t:'Young people are asked to give feedback about what would improve their youth voice experience'},
    {id:'p1b',t:'Learnings about youth voice are shared with other people and groups'}
  ]},
  {id:'p2',title:'Young people have a say in how things are run',sub:[
    {id:'p2a',t:'Adults and young people talk about who is in charge and why'},
    {id:'p2b',t:'Young people feel their work belongs to them and care about the outcome'}
  ]},
  {id:'p3',title:'Adults and young people agree on what they want to achieve together',sub:[
    {id:'p3a',t:'Adults and young people work as a team to create the plans for youth voice'},
    {id:'p3b',t:'These goals are supported by appropriate amounts of money, time and skills'}
  ]},
  {id:'p4',title:'Every young person feels safe to contribute honestly',sub:[
    {id:'p4a',t:'Young people can choose to take part in the way that suits them best'},
    {id:'p4b',t:'Young people feel supported and cared for, with regular feedback collected on this'}
  ]},
  {id:'p5',title:'Young people benefit from taking part',sub:[
    {id:'p5a',t:'Young people say that taking part is a good use of their time'},
    {id:'p5b',t:'Young people get something positive back from being involved (like new skills or confidence)'}
  ]},
  {id:'p6',title:'The opportunities are as fair and equitable as possible',sub:[
    {id:'p6a',t:'Everyone gets the help they need to take part, especially those who often feel left out'},
    {id:'p6b',t:'Young people help decide how to make the group fair and welcoming for everyone'},
    {id:'p6c',t:"Youth voice aligns with the wider organisation's policies around equity"}
  ]},
  {id:'p7',title:'All adults are part of a culture that truly listens and takes action',sub:[
    {id:'p7a',t:'Young people are listened to'},
    {id:'p7b',t:'The organisation is set up in a way that makes it easy to listen and respond to youth voice'},
    {id:'p7c',t:'It is clear what happens as a result of youth voice activities'}
  ]}
];
const SI={
  1:{bg:'#FCEBEB',bd:'#F09595',tx:'#791F1F',desc:"Doesn't happen, or very inconsistently",hint:'What might be limiting this? What do you need to do to improve, and who needs to be involved?'},
  3:{bg:'#FAEEDA',bd:'#EF9F27',tx:'#633806',desc:'Happens for some young people, some of the time',hint:'How can you make this the norm for all young people? What is affecting who is included or excluded?'},
  5:{bg:'#EAF3DE',bd:'#97C459',tx:'#27500A',desc:'Happens for all young people, all of the time',hint:'How will you keep things at this level? Are there opportunities to share your learnings with others?'}
};

const SHEETS_URL='https://script.google.com/macros/s/AKfycbyVBo2Gf1oBKY8gwu8kmIIht_JCuiHVnKUQfbihzKl3pY8ofOgY90zlcqsd5XD4zuRq/exec';

const S={step:'intro',orgName:'',groupMembers:'',date:new Date().toLocaleDateString('en-GB'),focusType:'',focusOther:'',shareData:false,ranked:P.map((_,i)=>i),scoringIdx:0,responses:{}};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const header=()=>`<div class="header">
  <div class="header-text">
    <div class="header-eyebrow">Centre for Youth Voice</div>
    <div class="header-title">Youth Voice Self-Assessment Tool</div>
  </div>
  <button class="fs-btn" onclick="document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()">&#x26F6; Fullscreen</button>
</div>`;

const badge=(n,label)=>`<div class="step-badge no-print"><span class="step-pill">Step ${n} of 4</span><span class="step-label">${label}</span></div>`;

function introHTML(){
  const tips=[
    ['&#128101;','Do it together','This is a co-assessment — designed to be used by young people and adults in the same room. Both perspectives matter equally.'],
    ['&#128172;','Discuss as a group','Talk through each sub-principle together before agreeing a score. If you can\'t agree, that\'s fine — it usually means you\'ve found something important worth exploring.'],
    ['&#127919;','You choose the focus','You can assess a one-off event, a specific project, or how your whole organisation works. Decide together what you\'re reflecting on before you start.'],
    ['&#9997;&#65039;','Be honest','This isn\'t about getting the highest score — it\'s about having a real conversation. The most useful sessions are the ones where people speak honestly.'],
    ['&#128337;','Take your time','You don\'t have to finish in one go. You can pause, come back, or choose to focus on just a few principles that matter most right now.'],
    ['&#128260;','Keep coming back','This isn\'t a one-time test. Use it regularly to track how your practice is improving over time.'],
  ];
  const tipCards=tips.map(([icon,title,text])=>`
    <div style="display:flex;gap:12px;align-items:flex-start;padding:12px 14px;background:#fff;border:1px solid #ebe8e8;border-radius:9px">
      <span style="font-size:18px;flex-shrink:0;margin-top:1px">${icon}</span>
      <div><div style="font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:3px">${title}</div><div style="font-size:13px;color:#555;line-height:1.6">${text}</div></div>
    </div>`).join('');
  return `<div class="screen">${header()}${badge(1,'Your details')}
  <div class="card card-top" style="margin-bottom:1.25rem">
    <p style="font-size:14px;color:#555;margin-bottom:1.25rem;line-height:1.75">This tool was co-developed with the <strong style="color:#1a1a1a">Youth Voice Ambassadors</strong> — a group of 16–24-year-olds — to help adults and young people reflect on their youth voice practice together. Work through it as a group, discuss each question openly, and use it to spark honest conversation about what's working and what could be better.</p>
    <div style="font-size:11px;font-weight:700;color:#861F57;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px">How to run this session</div>
    <div style="display:flex;flex-direction:column;gap:8px">${tipCards}</div>
  </div>
  <div class="card card-top">
    <div style="font-size:11px;font-weight:700;color:#861F57;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:1rem">Before you begin</div>
    <div style="display:flex;flex-direction:column;gap:1.1rem">
      <div><label class="field-label">Organisation or project name</label><input type="text" data-key="orgName" placeholder="e.g. Youth Forum, Islington" value="${esc(S.orgName)}"></div>
      <div><label class="field-label">Who's in the room today?</label><input type="text" data-key="groupMembers" placeholder="e.g. 4 young people, 2 youth workers" value="${esc(S.groupMembers)}"></div>
      <div><label class="field-label">Date</label><input type="text" data-key="date" value="${esc(S.date)}"></div>
      <div>
        <label class="field-label">What are we reflecting on?</label>
        <select data-key="focusType" style="width:100%;border:1.5px solid #e0dede;border-radius:8px;padding:10px 13px;font-size:14px;color:#1a1a1a;background:#fff;cursor:pointer;appearance:auto">
          <option value="" ${!S.focusType?'selected':''}>— Select one —</option>
          <option value="An event" ${S.focusType==='An event'?'selected':''}>An event</option>
          <option value="A workshop or training session" ${S.focusType==='A workshop or training session'?'selected':''}>A workshop or training session</option>
          <option value="The project so far" ${S.focusType==='The project so far'?'selected':''}>The project so far</option>
          <option value="Our ongoing youth voice practice" ${S.focusType==='Our ongoing youth voice practice'?'selected':''}>Our ongoing youth voice practice</option>
          <option value="How our organisation works" ${S.focusType==='How our organisation works'?'selected':''}>How our organisation works</option>
          <option value="A specific partnership or collaboration" ${S.focusType==='A specific partnership or collaboration'?'selected':''}>A specific partnership or collaboration</option>
          <option value="Other" ${S.focusType==='Other'?'selected':''}>Other — I'll describe it below</option>
        </select>
      </div>
      ${S.focusType==='Other'?`<div><label class="field-label">Please describe what you're reflecting on</label><textarea data-key="focusOther" rows="2" placeholder="e.g. Our youth board recruitment process">${esc(S.focusOther||'')}</textarea></div>`:''}
      <div style="margin-top:0.5rem">
        <label style="display:flex;align-items:flex-start;gap:12px;cursor:pointer;padding:14px;border-radius:10px;border:1.5px solid ${S.shareData?'#861F57':'#e0dede'};background:${S.shareData?'#F7EBF2':'#fff'};transition:all 0.15s ease">
          <input type="checkbox" data-key="shareData" ${S.shareData?'checked':''} style="width:18px;height:18px;margin-top:1px;flex-shrink:0;accent-color:#861F57;cursor:pointer">
          <div>
            <div style="font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:4px">Share my results with the Centre for Youth Voice</div>
            <div style="font-size:12px;color:#666;line-height:1.6">Tick this box to automatically share your anonymised scores and reflections with CYV when you generate your printout. This helps us understand how youth voice practice is developing across the sector. Your data will be stored securely and used only for research and improvement purposes. You can untick this at any time before generating your printout.</div>
          </div>
        </label>
      </div>
    </div>
  </div>
  <div style="display:flex;justify-content:flex-end;margin-top:1.25rem"><button class="btn-primary" data-action="start">Start &rarr;</button></div>
  </div>`;
}

function rankingHTML(){
  const items=S.ranked.map((pi,idx)=>`
    <div class="drag-item" draggable="true" data-idx="${idx}">
      <span class="drag-handle">&#8942;&#8942;</span>
      <span class="drag-num">${idx+1}</span>
      <span class="drag-title">${esc(P[pi].title)}</span>
    </div>`).join('');
  return `<div class="screen">${header()}${badge(2,'Rank your priorities')}
  <p style="font-size:14px;color:#555;margin-bottom:1.1rem;line-height:1.75">Which principles matter most to you right now? <strong style="color:#1a1a1a">Drag and drop</strong> to reorder — put your top priority at the top.</p>
  <div class="drag-list" id="drag-list">${items}</div>
  <div style="display:flex;gap:8px;justify-content:space-between">
    <button class="btn-secondary" data-action="to-intro">&larr; Back</button>
    <button class="btn-primary" data-action="start-scoring">Start scoring &rarr;</button>
  </div>
  </div>`;
}

function canGoNext(){
  const p=P[S.ranked[S.scoringIdx]];
  return p.sub.every(sp=>{const r=S.responses[sp.id]||{};return r.score&&(r.barriers||'').trim().length>0;});
}

function scoringHTML(){
  const p=P[S.ranked[S.scoringIdx]];
  const isLast=S.scoringIdx===P.length-1;
  const ok=canGoNext();
  const pct=Math.round((S.scoringIdx/P.length)*100);
  const spCards=p.sub.map(sp=>{
    const r=S.responses[sp.id]||{};
    const scoreBtns=[1,3,5].map(sc=>{
      const sel=r.score===sc;
      const info=SI[sc];
      const selStyle=sel?`background:${info.bg};border-color:${info.bd};color:${info.tx};`:'';
      return `<button class="score-btn" data-action="set-score" data-spid="${sp.id}" data-score="${sc}" style="${selStyle}">
        <div class="score-num">${sc}</div>
        <div class="score-desc">${info.desc}</div>
      </button>`;
    }).join('');
    const hint=r.score?`<div class="score-hint">${esc(SI[r.score].hint)}</div>`:'';
    return `<div class="sub-card">
      <div class="sub-card-title">${esc(sp.t)}</div>
      <div style="margin-bottom:1rem"><label class="field-label">Score</label><div class="score-btns">${scoreBtns}</div>${hint}</div>
      <div style="margin-bottom:0.875rem"><label class="field-label">Reflections: what worked well, what didn't? <span class="req">*</span></label><textarea data-key="${sp.id}_barriers" rows="3" placeholder="Share your honest reflections — what's going well and what's getting in the way?">${esc(r.barriers||'')}</textarea></div>
      <div><label class="field-label">What action do we want to take?</label><textarea data-key="${sp.id}_actions" rows="2" placeholder="What are you going to do next? Who needs to be involved?">${esc(r.actions||'')}</textarea></div>
    </div>`;
  }).join('');
  return `<div class="screen">${header()}${badge(3,'Score and reflect')}
  <div class="progress-wrap">
    <div class="progress-meta"><span class="progress-label">Principle ${S.scoringIdx+1} of ${P.length}</span><span class="progress-pct">${pct}% complete</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="principle-banner"><p>${esc(p.title)}</p></div>
  <div style="display:flex;flex-direction:column;gap:1rem;margin-bottom:1.25rem">${spCards}</div>
  <div style="display:flex;gap:8px;justify-content:space-between;align-items:flex-start">
    <button class="btn-secondary" data-action="prev-principle">&larr; Back</button>
    <div style="text-align:right">
      <button class="btn-primary" data-action="${isLast?'to-summary':'next-principle'}" ${ok?'':'disabled'}>${isLast?'View summary &rarr;':'Next principle &rarr;'}</button>
      ${!ok?'<p style="font-size:11px;color:#bbb;margin-top:6px">Score + reflection required for each sub-principle</p>':''}
    </div>
  </div>
  </div>`;
}

function summaryHTML(){
  const rp=S.ranked.map(i=>P[i]);
  const pill=sc=>{if(!sc)return'<span style="color:#ccc">—</span>';const i=SI[sc];return`<span class="score-pill" style="background:${i.bg};color:${i.tx};border:1.5px solid ${i.bd}">${sc}/5</span>`;};
  const rankList=rp.map((p,i)=>`<div class="rank-list-item"><span class="rank-list-num">${i+1}.</span><span class="rank-list-title">${esc(p.title)}</span></div>`).join('');
  const sections=rp.map((p,pi)=>{
    const rows=p.sub.map(sp=>{
      const r=S.responses[sp.id]||{};
      return`<div class="summary-row print-avoid">
        <div class="summary-row-title">${esc(sp.t)}</div>
        <div class="summary-grid">
          <div><div class="summary-col-label">Score</div>${pill(r.score)}</div>
          <div><div class="summary-col-label">Reflections: what worked well, what didn't?</div><div class="summary-col-val" style="color:${r.barriers?'#333':'#ccc'}">${esc(r.barriers||'—')}</div></div>
          <div><div class="summary-col-label">What action do we want to take?</div><div class="summary-col-val" style="color:${r.actions?'#333':'#ccc'}">${esc(r.actions||'—')}</div></div>
        </div>
      </div>`;
    }).join('');
    return`<div style="margin-bottom:1.75rem">
      <div class="summary-section-header"><span class="summary-priority-pill">Priority ${pi+1}</span><span class="summary-section-title">${esc(p.title)}</span></div>
      ${rows}
    </div>`;
  }).join('');
  return `<div class="screen">${header()}
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px" class="no-print">
    <button class="btn-secondary" data-action="edit-answers">&larr; Edit answers</button>
    <div style="display:flex;gap:8px">
      <button class="btn-secondary" data-action="start-over">Start over</button>
      <button class="btn-primary" data-action="do-print">Print / Save as PDF</button>
    </div>
  </div>
  <div class="card">
    <div style="border-bottom:2px solid #F7EBF2;padding-bottom:1.25rem;margin-bottom:1.5rem">
      <h1 style="font-size:20px;font-weight:800;margin-bottom:0.5rem;color:#5C1039;letter-spacing:-0.01em">Youth voice self-assessment</h1>
      <div style="display:flex;flex-wrap:wrap;gap:1rem">
        ${S.orgName?`<span style="font-size:13px;color:#888">Organisation: <strong style="color:#1a1a1a">${esc(S.orgName)}</strong></span>`:''}
        ${S.groupMembers?`<span style="font-size:13px;color:#888">Group: <strong style="color:#1a1a1a">${esc(S.groupMembers)}</strong></span>`:''}
        ${S.focusType?`<span style="font-size:13px;color:#888">Reflecting on: <strong style="color:#1a1a1a">${esc(S.focusType==='Other'?S.focusOther||'Other':S.focusType)}</strong></span>`:''}
        <span style="font-size:13px;color:#888">Date: <strong style="color:#1a1a1a">${esc(S.date)}</strong></span>
      </div>
    </div>
    <div class="field-label" style="margin-bottom:0.75rem">Priority order</div>
    <div style="margin-bottom:1.75rem">${rankList}</div>
    <div class="field-label" style="margin-bottom:1.25rem">Assessment by principle</div>
    ${sections}
  </div>
  </div>`;
}

function buildPrintHTML(){
  const rp=S.ranked.map(i=>P[i]);
  const sc2s=sc=>{if(sc===1)return'background:#FCEBEB;color:#791F1F;border:1px solid #F09595';if(sc===3)return'background:#FAEEDA;color:#633806;border:1px solid #EF9F27';if(sc===5)return'background:#EAF3DE;color:#27500A;border:1px solid #97C459';return'background:#f5f5f5;color:#666;border:1px solid #ddd';};
  const rankList=rp.map((p,i)=>`<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #eee"><strong style="color:#861F57;min-width:20px">${i+1}.</strong><span>${esc(p.title)}</span></div>`).join('');
  const sections=rp.map((p,pi)=>{
    const rows=p.sub.map(sp=>{
      const r=S.responses[sp.id]||{};
      return`<div style="border:1px solid #e5e5e5;border-radius:7px;padding:13px;margin-bottom:9px;page-break-inside:avoid">
        <p style="font-weight:700;margin:0 0 11px;font-size:13px;color:#222">${esc(sp.t)}</p>
        <div style="display:grid;grid-template-columns:78px 1fr 1fr;gap:13px;align-items:start">
          <div><div style="font-size:9px;color:#aaa;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;font-weight:800">Score</div><span style="display:inline-block;${sc2s(r.score)};padding:3px 11px;border-radius:100px;font-size:12px;font-weight:800">${r.score?r.score+'/5':'—'}</span></div>
          <div><div style="font-size:9px;color:#aaa;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;font-weight:800">Reflections: what worked well, what didn't?</div><p style="font-size:13px;margin:0;color:${r.barriers?'#222':'#bbb'};line-height:1.6">${esc(r.barriers||'—')}</p></div>
          <div><div style="font-size:9px;color:#aaa;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;font-weight:800">What action do we want to take?</div><p style="font-size:13px;margin:0;color:${r.actions?'#222':'#bbb'};line-height:1.6">${esc(r.actions||'—')}</p></div>
        </div>
      </div>`;
    }).join('');
    return`<div style="margin-bottom:22px;page-break-inside:avoid">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px;padding:7px 11px;background:#F7EBF2;border-radius:7px">
        <span style="background:#861F57;color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:100px;-webkit-print-color-adjust:exact;print-color-adjust:exact;text-transform:uppercase;letter-spacing:.05em">Priority ${pi+1}</span>
        <span style="font-size:13px;font-weight:700;color:#5C1039">${esc(p.title)}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
  return`<!DOCTYPE html><html><head><title>Youth voice self-assessment${S.orgName?' — '+S.orgName:''}</title>
  <style>*{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}body{font-family:system-ui,sans-serif;font-size:14px;color:#333;max-width:760px;margin:20px auto;padding:0 20px;line-height:1.5}@media print{body{margin:0;max-width:none}}@page{margin:1.5cm}</style>
  </head><body>
  <div style="background:linear-gradient(135deg,#861F57,#6b1847);padding:15px 20px;border-radius:9px;margin-bottom:22px;-webkit-print-color-adjust:exact;print-color-adjust:exact">
    <div style="font-size:10px;font-weight:800;color:rgba(255,255,255,0.65);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">Centre for Youth Voice</div>
    <h1 style="font-size:20px;margin:0;color:#fff;font-weight:800;letter-spacing:-.01em">Youth voice self-assessment</h1>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:16px;font-size:13px;color:#888;margin-bottom:22px">
    ${S.orgName?`<span>Organisation: <strong style="color:#222">${esc(S.orgName)}</strong></span>`:''}
    ${S.groupMembers?`<span>Group: <strong style="color:#222">${esc(S.groupMembers)}</strong></span>`:''}
    ${S.focusType?`<span>Reflecting on: <strong style="color:#222">${esc(S.focusType==='Other'?S.focusOther||'Other':S.focusType)}</strong></span>`:''}
    <span>Date: <strong style="color:#222">${esc(S.date)}</strong></span>
  </div>
  <div style="font-size:10px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:11px">Priority order</div>
  <div style="margin-bottom:26px">${rankList}</div>
  <div style="font-size:10px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:15px">Assessment by principle</div>
  ${sections}
  <script>window.onload=function(){window.print()}<\/script>
  </body></html>`;
}

function sendToSheets(payload){
  try{
    const blob=new Blob([JSON.stringify(payload)],{type:'text/plain;charset=UTF-8'});
    const sent=navigator.sendBeacon(SHEETS_URL,blob);
    if(!sent){
      // sendBeacon failed (e.g. payload too large) — fall back to fetch with no-cors
      fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=UTF-8'},body:JSON.stringify(payload)}).catch(()=>{});
    }
  }catch(e){
    fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=UTF-8'},body:JSON.stringify(payload)}).catch(()=>{});
  }
}

function openPrint(){
  const w=window.open('','_blank');
  if(w){w.document.write(buildPrintHTML());w.document.close();}
}

function render(){
  const app=document.getElementById('app');
  if(!app)return;
  if(S.step==='intro')app.innerHTML=introHTML();
  else if(S.step==='ranking')app.innerHTML=rankingHTML();
  else if(S.step==='scoring')app.innerHTML=scoringHTML();
  else app.innerHTML=summaryHTML();
  if(S.step==='ranking')initDrag();
}

function setState(u){Object.assign(S,u);render();}

function initDrag(){
  const list=document.getElementById('drag-list');
  if(!list)return;
  let dragIdx=null;
  list.querySelectorAll('.drag-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{
      dragIdx=+item.dataset.idx;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    item.addEventListener('dragend',()=>{
      item.classList.remove('dragging');
      list.querySelectorAll('.drag-item').forEach(i=>i.classList.remove('drag-over'));
    });
    item.addEventListener('dragover',e=>{
      e.preventDefault();
      list.querySelectorAll('.drag-item').forEach(i=>i.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });
    item.addEventListener('drop',e=>{
      e.preventDefault();
      const toIdx=+item.dataset.idx;
      if(dragIdx===null||dragIdx===toIdx)return;
      const n=[...S.ranked];
      const moved=n.splice(dragIdx,1)[0];
      n.splice(toIdx,0,moved);
      dragIdx=null;
      setState({ranked:n});
    });
  });
}

document.getElementById('app').addEventListener('click',e=>{
  const btn=e.target.closest('[data-action]');
  if(!btn||btn.disabled)return;
  const a=btn.dataset.action,d=btn.dataset;
  if(a==='start')setState({step:'ranking'});
  else if(a==='to-intro')setState({step:'intro'});
  else if(a==='start-scoring')setState({step:'scoring',scoringIdx:0});
  else if(a==='set-score'){if(!S.responses[d.spid])S.responses[d.spid]={};S.responses[d.spid].score=+d.score;render();}
  else if(a==='prev-principle'){if(S.scoringIdx>0)setState({scoringIdx:S.scoringIdx-1});else setState({step:'ranking'});}
  else if(a==='next-principle'){if(S.scoringIdx<P.length-1)setState({scoringIdx:S.scoringIdx+1});}
  else if(a==='to-summary')setState({step:'summary'});
  else if(a==='edit-answers')setState({step:'scoring',scoringIdx:P.length-1});
  else if(a==='start-over'){if(confirm('Start over? Your answers will be lost.'))setState({step:'intro',orgName:'',groupMembers:'',date:new Date().toLocaleDateString('en-GB'),focusType:'',focusOther:'',shareData:false,ranked:P.map((_,i)=>i),scoringIdx:0,responses:{}});}
  else if(a==='do-print'){
    if(S.shareData){
      const printBtn=document.querySelector('[data-action="do-print"]');
      const orig=printBtn.textContent;
      printBtn.textContent='Sending…';
      printBtn.disabled=true;
      const payload={
        orgName:S.orgName,
        groupMembers:S.groupMembers,
        date:S.date,
        focusType:S.focusType==='Other'?S.focusOther:S.focusType,
        priorityOrder:S.ranked.map(i=>P[i].title).join(' > '),
        responses:S.responses
      };
      sendToSheets(payload);
      // Give beacon 600ms to fire, then open print regardless
      setTimeout(()=>{
        openPrint();
        printBtn.textContent=orig;
        printBtn.disabled=false;
      },600);
    } else {
      openPrint();
    }
  }
});

document.getElementById('app').addEventListener('input',e=>{
  const el=e.target,key=el.dataset.key;
  if(!key)return;
  if(key==='orgName'){S.orgName=el.value;return;}
  if(key==='groupMembers'){S.groupMembers=el.value;return;}
  if(key==='date'){S.date=el.value;return;}
  if(key==='focusType'){S.focusType=el.value;render();return;}
  if(key==='focusOther'){S.focusOther=el.value;return;}
  if(key==='shareData'){S.shareData=el.checked;render();return;}
  const ui=key.lastIndexOf('_');
  if(ui>0){
    const spid=key.substring(0,ui),field=key.substring(ui+1);
    if(!S.responses[spid])S.responses[spid]={};
    S.responses[spid][field]=el.value;
    if(S.step==='scoring'){
      const nb=document.querySelector('[data-action="next-principle"],[data-action="to-summary"]');
      if(nb){nb.disabled=!canGoNext();}
    }
  }
});

render();
</script>
</body>
</html>
